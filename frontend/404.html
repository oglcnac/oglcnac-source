<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    const parts = window.location.pathname.split("/").filter(Boolean);
    if (parts[0] === "atlas" && parts[1] === "detail" && parts[2]) {
      window.location.replace(`/atlas/detail/?id=${encodeURIComponent(parts[2])}`);
    } else if (parts[0] === "ogt-pin" && parts[1] === "detail" && parts[2]) {
      window.location.replace(`/ogt-pin/detail/?id=${encodeURIComponent(parts[2])}`);
    } else {
      window.location.replace("/");
    }
  </script>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
